name: Build & Upload Release Packages

on:
  push:
    tags:
      - "v*.*.*"   # Runs when you push a version tag like v1.0.0

jobs:
  build-package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up LaTeX
        run: sudo apt-get update && sudo apt-get install -y texlive-latex-base texlive-latex-recommended texlive-latex-extra texlive-bibtex-extra latexmk

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build packages
        run: make package

      - name: Upload release assets
        uses: softprops/action-gh-release@v1
        with:
          files: |
            arxiv_submission.zip
            zenodo_bundle.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
