name: Bibliography Lint & Auto-Fix

on:
  push:
    paths:
      - '**.bib'
      - '.github/workflows/bibcheck.yml'
  pull_request:
    paths:
      - '**.bib'
      - '.github/workflows/bibcheck.yml'

jobs:
  bib-lint:
    runs-on: ubuntu-latest
    outputs:
      lint-status: ${{ steps.lint.outcome }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - id: lint
        name: Run bibliography lint
        run: |
          python polish_bib.py main.bib --check-only

  bib-fix:
    runs-on: ubuntu-latest
    needs: bib-lint
    if: ${{ failure() }}   # run only if lint job fails
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run polish and auto-fix
        run: |
          python polish_bib.py main.bib main_polished.bib --auto-rename --sort
          mv main_polished.bib main.bib

      - name: Commit and push fixes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(bib): auto-polish and deduplicate bibliography"
          branch: bibfix
          file_pattern: '*.bib'
